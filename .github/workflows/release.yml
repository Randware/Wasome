name: Release

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build - ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- NATIVE LINUX
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            builder: cargo

          # --- CROSS-COMPILED LINUX & FREEBSD (via Nix)
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            nix_target: aarch64-linux
            archive: tar.gz
            builder: nix
          - os: ubuntu-24.04
            target: armv7-unknown-linux-gnueabihf
            nix_target: armv7l-linux
            archive: tar.gz
            builder: nix
          - os: ubuntu-24.04
            target: i686-unknown-linux-gnu
            nix_target: i686-linux
            archive: tar.gz
            builder: nix
          - os: ubuntu-24.04
            target: x86_64-unknown-freebsd
            nix_target: x86_64-freebsd
            archive: tar.gz
            builder: nix

          # --- MAC OS
          - os: macos-26-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            builder: cargo
          - os: macos-26
            target: aarch64-apple-darwin
            archive: tar.gz
            builder: cargo

          # --- WINDOWS
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            builder: cargo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-wasip1, wasm32-unknown-unknown

      # --- NIX INSTALLATION
      - name: Install Nix
        if: matrix.builder == 'nix'
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix Store
        if: matrix.builder == 'nix'
        uses: DeterminateSystems/magic-nix-cache-action@v8

      # --- NATIVE LLVM INSTALLATIONS
      - name: Install LLVM 21 (Ubuntu Native)
        if: matrix.os == 'ubuntu-24.04' && matrix.builder == 'cargo'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 all
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-21" >> $GITHUB_ENV
          echo "/usr/lib/llvm-21/bin" >> $GITHUB_PATH
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=-C link-arg=-fuse-ld=lld" >> $GITHUB_ENV

      - name: Cache LLVM 21 (Windows)
        if: matrix.os == 'windows-latest'
        id: cache-llvm-windows
        uses: actions/cache@v4
        with:
          path: C:\llvm
          key: llvm-21-windows

      - name: Install LLVM 21 (Windows)
        if: matrix.os == 'windows-latest' && steps.cache-llvm-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $archive = "$env:TEMP\llvm.7z"
          curl.exe -L --output $archive "https://github.com/c3lang/win-llvm/releases/download/llvm_21_1_8/llvm-21.1.8-windows-amd64-msvc17-msvcrt.7z"
          7z x $archive -o"C:\llvm" -y

      - name: Export LLVM Prefix (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $llvmDir = (Get-ChildItem "C:\llvm" -Directory | Select-Object -First 1).FullName
          echo "LLVM_SYS_211_PREFIX=$llvmDir" >> $env:GITHUB_ENV
          echo "LLVM_SYS_211_PREFER_STATIC=1" >> $env:GITHUB_ENV
          echo "$llvmDir\bin" >> $env:GITHUB_PATH

      - name: Install LLVM 21 and LLD (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install llvm@21 lld

      - name: Export LLVM Prefix (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          LLVM_DIR=$(brew --prefix llvm@21)
          echo "LLVM_SYS_211_PREFIX=$LLVM_DIR" >> $GITHUB_ENV
          echo "$LLVM_DIR/bin" >> $GITHUB_PATH

      # --- COMPILATION
      - name: Build Compiler (Native)
        if: matrix.builder == 'cargo'
        run: cargo build --release --target ${{ matrix.target }} --manifest-path cli/Cargo.toml

      - name: Build Compiler (Nix Cross)
        if: matrix.builder == 'nix'
        run: nix build .#packages.${{ matrix.nix_target }}.default

      - name: Build Standard Library (WASI)
        run: cargo build --release --target wasm32-wasip1 --manifest-path stdlib/rust/Cargo.toml --features "runtime"

      - name: Build Standard Library (Web)
        run: cargo build --release --target wasm32-unknown-unknown --manifest-path stdlib/rust/Cargo.toml --features "web"

      # --- PACKAGING
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release_pkg/bin
          mkdir -p release_pkg/lib
          mkdir -p release_pkg/std/runtime/lib
          mkdir -p release_pkg/std/runtime/wasome
          mkdir -p release_pkg/std/web/lib
          mkdir -p release_pkg/std/web/wasome

          # Copy frontend based on build method
          if [ "${{ matrix.builder }}" == "nix" ]; then
            cp result/bin/* release_pkg/bin/
            cp result/lib/* release_pkg/lib/
          else
            cp cli/target/${{ matrix.target }}/release/waso release_pkg/bin/waso
            
            # Bundle dynamic libraries for standalone wasm-ld
            if [[ "${{ matrix.os }}" == macos* ]]; then
              cp -L "$(which wasm-ld)" release_pkg/lib/wasm-ld
              
              # Homebrew binaries often reference core LLVM dylibs via @rpath instead of absolute paths.
              # Explicitly copy the core LLVM libraries first to ensure they are included.
              LLVM_DIR=$(brew --prefix llvm@21)
              cp -L "$LLVM_DIR"/lib/liblld*.dylib release_pkg/lib/ 2>/dev/null || true
              cp -L "$LLVM_DIR"/lib/libLLVM*.dylib release_pkg/lib/ 2>/dev/null || true
              cp -L "$LLVM_DIR"/lib/libc++*.dylib release_pkg/lib/ 2>/dev/null || true
              
              # Automatically find and copy all other Homebrew dylib dependencies (compute full closure)
              while true; do
                  new_libs=0
                  deps=$(otool -L release_pkg/lib/wasm-ld release_pkg/lib/*.dylib 2>/dev/null | awk '{print $1}' | grep -E '^/opt/homebrew|^/usr/local' | sort -u || true)
                  for dep in $deps; do
                      if [ ! -f "release_pkg/lib/$(basename "$dep")" ]; then
                          cp -L "$dep" release_pkg/lib/ 2>/dev/null || true
                          new_libs=1
                      fi
                  done
                  if [ "$new_libs" -eq 0 ]; then
                      break
                  fi
              done
              
              # Add @loader_path to the rpath of every binary and change absolute/rpath dependencies to use @rpath
              for file in release_pkg/lib/wasm-ld release_pkg/lib/*.dylib; do
                  [ -f "$file" ] || continue
                  
                  if [[ "$file" == *.dylib ]]; then
                      install_name_tool -id "@rpath/$(basename "$file")" "$file" || true
                  fi
                  
                  install_name_tool -add_rpath "@loader_path" "$file" 2>/dev/null || true
                  
                  otool -L "$file" | awk 'NR>1 {print $1}' | grep -E '^/opt/homebrew|^/usr/local' | while read -r dep; do
                      install_name_tool -change "$dep" "@rpath/$(basename "$dep")" "$file" || true
                  done
              done
            elif [[ "${{ matrix.os }}" == ubuntu* ]]; then
              cp -L "$(which wasm-ld)" release_pkg/lib/wasm-ld
              cp -L /usr/lib/llvm-21/lib/libLLVM*.so* release_pkg/lib/ 2>/dev/null || true
              cp -L /usr/lib/llvm-21/lib/liblld*.so* release_pkg/lib/ 2>/dev/null || true
              
              # Ensure wasm-ld and its libraries look for dependencies in their own directory
              sudo apt-get update && sudo apt-get install -y patchelf
              find release_pkg/lib -type f \( -name "wasm-ld" -o -name "*.so*" \) -exec patchelf --set-rpath '$ORIGIN' {} \; || true
            else
              cp -L "$(which wasm-ld)" release_pkg/lib/wasm-ld
            fi
            
            chmod +x release_pkg/lib/wasm-ld
          fi

          cp -r stdlib/wasome/* release_pkg/std/runtime/wasome/
          cp stdlib/rust/target/wasm32-wasip1/release/libstd.a release_pkg/std/runtime/lib/libstd.a
          cp -r stdlib/wasome/* release_pkg/std/web/wasome/
          cp stdlib/rust/target/wasm32-unknown-unknown/release/libstd.a release_pkg/std/web/lib/libstd.a

          cd release_pkg
          tar -czvf ../wasome-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_pkg\bin
          New-Item -ItemType Directory -Force -Path release_pkg\lib
          New-Item -ItemType Directory -Force -Path release_pkg\std\runtime\lib
          New-Item -ItemType Directory -Force -Path release_pkg\std\runtime\wasome
          New-Item -ItemType Directory -Force -Path release_pkg\std\web\lib
          New-Item -ItemType Directory -Force -Path release_pkg\std\web\wasome

          Copy-Item cli\target\${{ matrix.target }}\release\waso.exe release_pkg\bin\waso.exe
          $llvmDir = (Get-ChildItem "C:\llvm" -Directory | Select-Object -First 1).FullName
          Copy-Item "$llvmDir\bin\wasm-ld.exe" release_pkg\lib\wasm-ld.exe
          Copy-Item -Recurse stdlib\wasome\* release_pkg\std\runtime\wasome\
          Copy-Item stdlib\rust\target\wasm32-wasip1\release\libstd.a release_pkg\std\runtime\lib\libstd.a
          Copy-Item -Recurse stdlib\wasome\* release_pkg\std\web\wasome\
          Copy-Item stdlib\rust\target\wasm32-unknown-unknown\release\libstd.a release_pkg\std\web\lib\libstd.a

          Compress-Archive -Path release_pkg\* -DestinationPath wasome-${{ matrix.target }}.zip

      - name: Upload Artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wasome-${{ matrix.target }}.${{ matrix.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    name: Publish Homebrew Formula
    needs: build-and-release
    runs-on: ubuntu-24.04
    steps:
      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Download release assets and calculate SHAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${VERSION} --repo ${{ github.repository }} --pattern "*.tar.gz"

          echo "MAC_ARM_SHA=$(sha256sum wasome-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "MAC_X86_SHA=$(sha256sum wasome-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "LINUX_ARM_SHA=$(sha256sum wasome-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> $GITHUB_ENV
          echo "LINUX_X86_SHA=$(sha256sum wasome-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> $GITHUB_ENV

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v4
        with:
          repository: Randware/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        run: |
          mkdir -p homebrew-tap/Formula
          cat << EOF > homebrew-tap/Formula/wasome.rb
          class Wasome < Formula
            desc "The WebAssembly Language for Everyone"
            homepage "https://wasome.dev/"
            version "${VERSION}"

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/wasome-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM_SHA}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/wasome-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_X86_SHA}"
              end
            elsif OS.linux?
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/wasome-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/wasome-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_SHA}"
              end
            end

            def install
              libexec.install "bin", "lib", "std"
              bin.install_symlink libexec/"bin/waso"
            end
          end
          EOF

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wasome.rb
          
          if git diff --cached --quiet; then
            echo "No changes to commit; Homebrew formula is already up to date."
          else
            git commit -m "Update Wasome to ${VERSION}"
            git push
          fi
