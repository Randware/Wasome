name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-standard:
    name: ${{ matrix.name || matrix.os }}
    runs-on: ${{ matrix.os }}
    # We run inside a Fedora container on the Ubuntu runner.
    # When running on native ubuntu the testing times took up to 30 minutes.
    # I could not find why this is the case, but I guess it builts LLVM from scratch, even though we are downloading precompiled bins,
    # and linkin it correctly. I tried to solve this issue for way too long and i just switched distro
    # Idk why but when using a fedora container ontop of ubuntu it magically works. So I just leave it that way...
    container: ${{ matrix.os == 'ubuntu-latest' && 'fedora:latest' || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            name: fedora-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # ── Fedora (runs on ubuntu-latest runner inside fedora container) ─────
      - name: Install dependencies (Fedora)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dnf install -y rust cargo clang lld llvm21-devel cmake git \
            libffi-devel zlib-devel libxml2-devel

      - name: Export LLVM Prefix (Fedora)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "LLVM_SYS_211_PREFIX=$(llvm-config-21 --prefix)" >> $GITHUB_ENV
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=lld" >> $GITHUB_ENV

      # ── Windows ───────────────────────────────────────────────────────────
      - name: Cache LLVM 21 (Windows)
        if: matrix.os == 'windows-latest'
        id: cache-llvm-windows
        uses: actions/cache@v4
        with:
          path: C:\llvm
          key: llvm-21-windows

      - name: Install LLVM 21 (Windows)
        if: matrix.os == 'windows-latest' && steps.cache-llvm-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $archive = "$env:TEMP\llvm.7z"
          curl.exe -L --output $archive "https://github.com/c3lang/win-llvm/releases/download/llvm_21_1_8/llvm-21.1.8-windows-amd64-msvc17-msvcrt.7z"
          7z x $archive -o"C:\llvm" -y

      - name: Export LLVM Prefix (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $llvmDir = (Get-ChildItem "C:\llvm" -Directory | Select-Object -First 1).FullName
          echo "LLVM_SYS_211_PREFIX=$llvmDir" >> $env:GITHUB_ENV
          echo "$llvmDir\bin" >> $env:GITHUB_PATH

      # ── macOS ─────────────────────────────────────────────────────────────
      - name: Install LLVM 21 and LLD (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install llvm@21 lld

      - name: Export LLVM Prefix (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          LLVM_DIR=$(brew --prefix llvm@21)

          echo "LLVM_SYS_211_PREFIX=$LLVM_DIR" >> $GITHUB_ENV
          echo "$LLVM_DIR/bin" >> $GITHUB_PATH

      # ── Shared ────────────────────────────────────────────────────────────
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache
        shell: bash
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV

      - name: Run Tests
        id: test
        shell: bash
        run: |
          cargo test --workspace --manifest-path compiler/Cargo.toml --release -- --test-threads=8
          cargo test --workspace --manifest-path cli/Cargo.toml --release -- --test-threads=8

      - name: Save Result
        if: always()
        run: echo "${{ matrix.name || matrix.os }}|Standard OS|${{ steps.test.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_${{ matrix.os }}.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-${{ matrix.os }}
          path: result_*.txt

  test-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test on FreeBSD
        id: freebsd
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y rust git cmake llvm21
          run: |
            set -e
            export LLVM_SYS_211_PREFIX=/usr/local/llvm21
            cargo test --workspace --manifest-path compiler/Cargo.toml --jobs 2
            cargo test --workspace --manifest-path cli/Cargo.toml --jobs 2

      - name: Save Result
        if: always()
        run: echo "FreeBSD|VM Environment|${{ steps.freebsd.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_freebsd.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-freebsd
          path: result_freebsd.txt

  test-devcontainer:
    name: Devcontainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests inside Devcontainer
        id: devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: wasome-compiler-devcontainer
          subFolder: compiler
          runCmd: cargo test --workspace
          # Prevent docker to push the container image to DockerHub
          # This is useless and would fail, because we don't have any DockerHub credentials
          push: never

      - name: Save Result
        if: always()
        run: echo "Devcontainer|Isolated Container|${{ steps.devcontainer.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_devcontainer.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-devcontainer
          path: result_devcontainer.txt

  test-nix:
    name: Nix Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix Store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run Nix Flake Check and Tests
        id: nix
        working-directory: ./compiler
        run: |
          nix flake check
          nix develop --command cargo test --workspace

      - name: Save Result
        if: always()
        run: echo "Nix Flake|Isolated Environment|${{ steps.nix.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_nix.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-nix
          path: result_nix.txt

  test-nix-cross:
    name: Nix Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux
            pkgsCross: aarch64-multiplatform
          - target: armv7l-linux
            pkgsCross: armv7l-hf-multiplatform
          - target: riscv64-linux
            pkgsCross: riscv64
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix Store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Cross-compile for ${{ matrix.target }}
        id: cross
        working-directory: ./compiler
        run: nix build .#packages.${{ matrix.target }}.default

      - name: Save Result
        if: always()
        run: echo "${{ matrix.target }}|Nix Cross-Compile|${{ steps.cross.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_nix_cross_${{ matrix.target }}.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-nix-cross-${{ matrix.target }}
          path: result_nix_cross_*.txt

  report:
    needs:
      [test-standard, test-freebsd, test-devcontainer, test-nix, test-nix-cross]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true

      - name: Generate Report
        id: generate
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          LOGO_WASOME="https://raw.githubusercontent.com/${{ github.repository }}/$BRANCH_NAME/.github/assets/Wasome_Yellow.png"

          {
            echo "REPORT<<EOF"
            echo "<div align='center'>"
            echo "  <img src='$LOGO_WASOME' width='300' alt='Wasome Integration Report Banner'>"
            echo "  <h3>Wasome Integration Report</h3>"
            echo ""
            echo "  <table>"
            echo "    <tr>"
            echo "      <th>System Architecture</th>"
            echo "      <th>Environment Type</th>"
            echo "      <th align='center'>Status</th>"
            echo "      <th align='center'>Logs</th>"
            echo "    </tr>"
          } >> $GITHUB_OUTPUT

          cat result_*.txt | tr -d '\r' | sort > all_results.txt
          OVERALL_STATUS=0

          while IFS='|' read -r ENV TYPE STATUS LOG_URL; do
            if [ "$STATUS" == "success" ]; then
              ICON="✅ PASS"
            else
              ICON="❌ FAIL"
              OVERALL_STATUS=1
            fi
            echo "    <tr>" >> $GITHUB_OUTPUT
            echo "      <td><code>$ENV</code></td>" >> $GITHUB_OUTPUT
            echo "      <td>$TYPE</td>" >> $GITHUB_OUTPUT
            echo "      <td align='center'><strong>$ICON</strong></td>" >> $GITHUB_OUTPUT
            echo "      <td align='center'><a href='$LOG_URL'>🔍 View</a></td>" >> $GITHUB_OUTPUT
            echo "    </tr>" >> $GITHUB_OUTPUT
          done < all_results.txt

          {
            echo "  </table>"
            echo "</div>"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "FAIL_WORKFLOW=$OVERALL_STATUS" >> $GITHUB_ENV

      - name: Post Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-report
          message: ${{ steps.generate.outputs.REPORT }}

      - name: Check for Failures
        if: env.FAIL_WORKFLOW == '1'
        run: |
          echo "::error::One or more test matrix combinations failed."
          exit 1
