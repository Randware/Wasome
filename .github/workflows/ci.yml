name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-standard:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # 1. Unified LLVM 21 Installation for Ubuntu, Windows, and macOS
      - name: Install LLVM 21
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      # 2. Export the exact prefix that llvm-sys v211 expects
      - name: Export LLVM Prefix
        shell: bash # Using bash ensures this exact syntax works across all 3 OS runners
        run: echo "LLVM_SYS_211_PREFIX=$LLVM_PATH" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            compiler
            cli

      - name: Run Tests
        id: test
        shell: bash
        run: |
          cargo test --workspace --manifest-path compiler/Cargo.toml
          cargo test --workspace --manifest-path cli/Cargo.toml

      - name: Save Result
        if: always()
        run: echo "${{ matrix.os }}|Standard OS|${{ steps.test.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_${{ matrix.os }}.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-${{ matrix.os }}
          path: result_*.txt

  test-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test on FreeBSD
        id: freebsd
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y rust git cmake llvm21
          run: |
            set -e # Exit immediately if command fails
            export LLVM_SYS_211_PREFIX=/usr/local/llvm21
            cargo test --workspace --manifest-path compiler/Cargo.toml --jobs 2
            cargo test --workspace --manifest-path cli/Cargo.toml --jobs 2

      - name: Save Result
        if: always()
        run: echo "FreeBSD|VM Environment|${{ steps.freebsd.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_freebsd.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-freebsd
          path: result_freebsd.txt

  test-devcontainer:
    name: Devcontainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests inside Devcontainer
        id: devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: wasome-compiler-devcontainer
          subFolder: compiler
          runCmd: cargo test --workspace

      - name: Save Result
        if: always()
        run: echo "Devcontainer|Isolated Container|${{ steps.devcontainer.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_devcontainer.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-devcontainer
          path: result_devcontainer.txt

  test-nix:
    name: Nix Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix Store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run Nix Flake Check and Tests
        id: nix
        working-directory: ./compiler
        run: |
          nix flake check
          nix develop --command cargo test --workspace

      - name: Save Result
        if: always()
        run: echo "Nix Flake|Isolated Environment|${{ steps.nix.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_nix.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-nix
          path: result_nix.txt

  test-nix-cross:
    name: Nix Cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-linux, armv7l-linux, riscv64-linux]
    steps:
      - uses: actions/checkout@v4

      # 1. Setup QEMU so the Ubuntu runner can execute/emulate ARM/RISC-V architecture
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Install Nix and explicitly tell it to use QEMU for these extra architectures
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-platforms = aarch64-linux armv7l-linux riscv64-linux

      - name: Cache Nix Store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Cross-compile for ${{ matrix.target }}
        id: cross
        working-directory: ./compiler
        run: nix build .#packages.${{ matrix.target }}.default

      - name: Save Result
        if: always()
        run: echo "${{ matrix.target }}|Nix Cross-Compile|${{ steps.cross.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_nix_cross_${{ matrix.target }}.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-nix-cross-${{ matrix.target }}
          path: result_nix_cross_*.txt

  report:
    needs:
      [test-standard, test-freebsd, test-devcontainer, test-nix, test-nix-cross]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true

      - name: Generate Report
        id: generate
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          LOGO_WASOME="https://raw.githubusercontent.com/${{ github.repository }}/$BRANCH_NAME/.github/assets/Wasome_Yellow.png"

          {
            echo "REPORT<<EOF"
            echo "<div align='center'>"
            echo "  <img src='$LOGO_WASOME' width='300' alt='Wasome Integration Report Banner'>"
            echo "  <h3>Wasome Integration Report</h3>"
            echo ""
            echo "  <table>"
            echo "    <tr>"
            echo "      <th>System Architecture</th>"
            echo "      <th>Environment Type</th>"
            echo "      <th align='center'>Status</th>"
            echo "      <th align='center'>Logs</th>"
            echo "    </tr>"
          } >> $GITHUB_OUTPUT

          cat result_*.txt | tr -d '\r' | sort > all_results.txt
          OVERALL_STATUS=0

          while IFS='|' read -r ENV TYPE STATUS LOG_URL; do
            if [ "$STATUS" == "success" ]; then
              ICON="✅ PASS"
            else
              ICON="❌ FAIL"
              OVERALL_STATUS=1
            fi
            echo "    <tr>" >> $GITHUB_OUTPUT
            echo "      <td><code>$ENV</code></td>" >> $GITHUB_OUTPUT
            echo "      <td>$TYPE</td>" >> $GITHUB_OUTPUT
            echo "      <td align='center'><strong>$ICON</strong></td>" >> $GITHUB_OUTPUT
            echo "      <td align='center'><a href='$LOG_URL'>🔍 View</a></td>" >> $GITHUB_OUTPUT
            echo "    </tr>" >> $GITHUB_OUTPUT
          done < all_results.txt

          {
            echo "  </table>"
            echo "</div>"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "FAIL_WORKFLOW=$OVERALL_STATUS" >> $GITHUB_ENV

      - name: Post Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-report
          message: ${{ steps.generate.outputs.REPORT }}

      - name: Check for Failures
        if: env.FAIL_WORKFLOW == '1'
        run: |
          echo "::error::One or more test matrix combinations failed."
          exit 1
