name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-standard:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        # This will default to the standard MSVC toolchain on Windows, which perfectly matches the C3Lang binaries.

      # --- UBUNTU LLVM ---
      - name: Install LLVM 21 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Export LLVM Prefix (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: echo "LLVM_SYS_211_PREFIX=$LLVM_PATH" >> $GITHUB_ENV

      # --- MACOS LLVM ---
      - name: Install LLVM 21 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm@21
          brew link --force --overwrite llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      # --- WINDOWS LLVM (THE ULTIMATE FIX) ---
      - name: Download Full Pre-compiled LLVM 21 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Fetching unstripped LLVM 21 from c3lang/win-llvm..."
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/c3lang/win-llvm/releases"

          # Find the most recent LLVM 21.x release
          $rel21 = $releases | Where-Object { $_.tag_name -match "21\." } | Select-Object -First 1
          if (-not $rel21) { throw "Could not find LLVM 21 release!" }

          # Find the 64-bit release 7z file
          $asset = $rel21.assets | Where-Object { $_.name -match "x86_64" -and $_.name -match "release\.7z" }
          if (-not $asset) { throw "Could not find asset!" }

          Write-Host "Downloading $($asset.browser_download_url)..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "llvm.7z"

          Write-Host "Extracting..."
          7z x llvm.7z -oC:\llvm_full | Out-Null

          $extractedDir = Get-ChildItem -Path C:\llvm_full | Select-Object -First 1
          Write-Host "Extracted to: $($extractedDir.FullName)"

          # Double check the executable exists just to be safe
          if (-not (Test-Path "$($extractedDir.FullName)\bin\llvm-config.exe")) {
              throw "llvm-config.exe is STILL missing! Aborting."
          }

          Write-Host "Setting Environment Variables for llvm-sys..."
          echo "LLVM_SYS_211_PREFIX=$($extractedDir.FullName)" >> $env:GITHUB_ENV
          echo "$($extractedDir.FullName)\bin" >> $env:GITHUB_PATH

      # --- TESTING ---
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            compiler
            cli

      - name: Run Tests
        id: test
        shell: bash
        run: |
          cargo test --workspace --manifest-path compiler/Cargo.toml
          cargo test --workspace --manifest-path cli/Cargo.toml

      - name: Save Result
        if: always()
        run: echo "${{ matrix.os }}|Standard OS|${{ steps.test.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_${{ matrix.os }}.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-${{ matrix.os }}
          path: result_*.txt

  test-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test on FreeBSD
        id: freebsd
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y rust git cmake llvm21
          run: |
            set -e
            export LLVM_SYS_211_PREFIX=/usr/local/llvm21
            cargo test --workspace --manifest-path compiler/Cargo.toml --jobs 2
            cargo test --workspace --manifest-path cli/Cargo.toml --jobs 2

      - name: Save Result
        if: always()
        run: echo "FreeBSD|VM Environment|${{ steps.freebsd.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_freebsd.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-freebsd
          path: result_freebsd.txt

  test-devcontainer:
    name: Devcontainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests inside Devcontainer
        id: devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: wasome-compiler-devcontainer
          subFolder: compiler
          runCmd: cargo test --workspace

      - name: Save Result
        if: always()
        run: echo "Devcontainer|Isolated Container|${{ steps.devcontainer.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_devcontainer.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-devcontainer
          path: result_devcontainer.txt

  test-nix:
    name: Nix Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix Store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run Nix Flake Check and Tests
        id: nix
        working-directory: ./compiler
        run: |
          nix flake check
          nix develop --command cargo test --workspace

      - name: Save Result
        if: always()
        run: echo "Nix Flake|Isolated Environment|${{ steps.nix.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_nix.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-nix
          path: result_nix.txt

  report:
    needs: [test-standard, test-freebsd, test-devcontainer, test-nix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true

      - name: Generate Report
        id: generate
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          LOGO_WASOME="https://raw.githubusercontent.com/${{ github.repository }}/$BRANCH_NAME/.github/assets/Wasome_Yellow.png"

          {
            echo "REPORT<<EOF"
            echo "<div align='center'>"
            echo "  <img src='$LOGO_WASOME' width='300' alt='Wasome Integration Report Banner'>"
            echo "  <h3>Wasome Integration Report</h3>"
            echo ""
            echo "  <table>"
            echo "    <tr>"
            echo "      <th>System Architecture</th>"
            echo "      <th>Environment Type</th>"
            echo "      <th align='center'>Status</th>"
            echo "      <th align='center'>Logs</th>"
            echo "    </tr>"
          } >> $GITHUB_OUTPUT

          cat result_*.txt | tr -d '\r' | sort > all_results.txt
          OVERALL_STATUS=0

          while IFS='|' read -r ENV TYPE STATUS LOG_URL; do
            if [ "$STATUS" == "success" ]; then
              ICON="✅ PASS"
            else
              ICON="❌ FAIL"
              OVERALL_STATUS=1
            fi
            echo "    <tr>" >> $GITHUB_OUTPUT
            echo "      <td><code>$ENV</code></td>" >> $GITHUB_OUTPUT
            echo "      <td>$TYPE</td>" >> $GITHUB_OUTPUT
            echo "      <td align='center'><strong>$ICON</strong></td>" >> $GITHUB_OUTPUT
            echo "      <td align='center'><a href='$LOG_URL'>🔍 View</a></td>" >> $GITHUB_OUTPUT
            echo "    </tr>" >> $GITHUB_OUTPUT
          done < all_results.txt

          {
            echo "  </table>"
            echo "</div>"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "FAIL_WORKFLOW=$OVERALL_STATUS" >> $GITHUB_ENV

      - name: Post Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-report
          message: ${{ steps.generate.outputs.REPORT }}

      - name: Check for Failures
        if: env.FAIL_WORKFLOW == '1'
        run: |
          echo "::error::One or more test matrix combinations failed."
          exit 1
