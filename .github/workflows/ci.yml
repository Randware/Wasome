name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-standard:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # --- RUST TOOLCHAIN SETUP ---
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Force Windows to use GNU toolchain to perfectly match MSYS2 LLVM libs
          toolchain: ${{ matrix.os == 'windows-latest' && 'stable-x86_64-pc-windows-gnu' || 'stable' }}

      # --- UBUNTU LLVM ---
      - name: Install LLVM 21 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Export LLVM Prefix (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: echo "LLVM_SYS_211_PREFIX=$LLVM_PATH" >> $GITHUB_ENV

      # --- MACOS LLVM ---
      - name: Install LLVM 21 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm@21
          brew link --force --overwrite llvm@21
          echo "LLVM_SYS_211_PREFIX=$(brew --prefix llvm@21)" >> $GITHUB_ENV

      # --- WINDOWS LLVM (THE TROJAN HORSE FIX) ---
      - name: Setup MSYS2 and Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # Installs the latest functioning LLVM (22) and GCC (needed for compiling bindings)
          install: >-
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-llvm-tools
            mingw-w64-x86_64-gcc

      - name: Compile Fake llvm-config Wrapper (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # 1. Dynamically hunt down the real MSYS2 llvm-config.exe
          $realLlvmConfig = (Get-Command llvm-config.exe -ErrorAction SilentlyContinue).Source

          if (-not $realLlvmConfig) {
              Write-Host "Fallback: Searching D:\a for llvm-config.exe..."
              $realLlvmConfig = (Get-ChildItem -Path D:\a -Filter "llvm-config.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }

          if (-not $realLlvmConfig -or -not (Test-Path $realLlvmConfig)) {
              throw "❌ CRITICAL: Cannot find the real llvm-config.exe anywhere on the runner!"
          }

          Write-Host "✅ Real llvm-config found at: $realLlvmConfig"
          $realBinDir = Split-Path $realLlvmConfig -Parent
          $escapedPath = $realLlvmConfig -replace '\\', '\\\\'

          # 2. Create our fake LLVM directory
          New-Item -ItemType Directory -Force -Path C:\fake-llvm\bin

          # 3. Write the Trojan Horse wrapper
          "use std::env;" > wrapper.rs
          "use std::process::Command;" >> wrapper.rs
          "fn main() {" >> wrapper.rs
          "    let args: Vec<String> = env::args().collect();" >> wrapper.rs
          "    if args.len() > 1 && args[1] == `"--version`" {" >> wrapper.rs
          "        println!(`"21.1.0`");" >> wrapper.rs
          "    } else {" >> wrapper.rs
          "        let status = Command::new(`"$escapedPath`").args(&args[1..]).status().expect(`"Failed to run real llvm-config`");" >> wrapper.rs
          "        std::process::exit(status.code().unwrap_or(1));" >> wrapper.rs
          "    }" >> wrapper.rs
          "}" >> wrapper.rs

          # 4. Compile it
          rustc wrapper.rs -o C:\fake-llvm\bin\llvm-config.exe

          # 5. Tell GitHub Actions about our dynamic paths
          echo "LLVM_SYS_211_PREFIX=C:\fake-llvm" >> $env:GITHUB_ENV
          echo "$realBinDir" >> $env:GITHUB_PATH

      # --- TESTING ---
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            compiler
            cli

      - name: Run Tests
        id: test
        shell: bash
        run: |
          cargo test --workspace --manifest-path compiler/Cargo.toml
          cargo test --workspace --manifest-path cli/Cargo.toml

      - name: Save Result
        if: always()
        run: echo "${{ matrix.os }}|Standard OS|${{ steps.test.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_${{ matrix.os }}.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-${{ matrix.os }}
          path: result_*.txt

  test-freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test on FreeBSD
        id: freebsd
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y rust git cmake llvm21
          run: |
            set -e
            export LLVM_SYS_211_PREFIX=/usr/local/llvm21
            cargo test --workspace --manifest-path compiler/Cargo.toml --jobs 2
            cargo test --workspace --manifest-path cli/Cargo.toml --jobs 2

      - name: Save Result
        if: always()
        run: echo "FreeBSD|VM Environment|${{ steps.freebsd.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_freebsd.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-freebsd
          path: result_freebsd.txt

  test-devcontainer:
    name: Devcontainer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests inside Devcontainer
        id: devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: wasome-compiler-devcontainer
          subFolder: compiler
          runCmd: cargo test --workspace

      - name: Save Result
        if: always()
        run: echo "Devcontainer|Isolated Container|${{ steps.devcontainer.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_devcontainer.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-devcontainer
          path: result_devcontainer.txt

  test-nix:
    name: Nix Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix Store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run Nix Flake Check and Tests
        id: nix
        working-directory: ./compiler
        run: |
          nix flake check
          nix develop --command cargo test --workspace

      - name: Save Result
        if: always()
        run: echo "Nix Flake|Isolated Environment|${{ steps.nix.outcome }}|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > result_nix.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-nix
          path: result_nix.txt

  report:
    needs: [test-standard, test-freebsd, test-devcontainer, test-nix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true

      - name: Generate Report
        id: generate
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          LOGO_WASOME="https://raw.githubusercontent.com/${{ github.repository }}/$BRANCH_NAME/.github/assets/Wasome_Yellow.png"

          {
            echo "REPORT<<EOF"
            echo "<div align='center'>"
            echo "  <img src='$LOGO_WASOME' width='300' alt='Wasome Integration Report Banner'>"
            echo "  <h3>Wasome Integration Report</h3>"
            echo ""
            echo "  <table>"
            echo "    <tr>"
            echo "      <th>System Architecture</th>"
            echo "      <th>Environment Type</th>"
            echo "      <th align='center'>Status</th>"
            echo "      <th align='center'>Logs</th>"
            echo "    </tr>"
          } >> $GITHUB_OUTPUT

          cat result_*.txt | tr -d '\r' | sort > all_results.txt
          OVERALL_STATUS=0

          while IFS='|' read -r ENV TYPE STATUS LOG_URL; do
            if [ "$STATUS" == "success" ]; then
              ICON="✅ PASS"
            else
              ICON="❌ FAIL"
              OVERALL_STATUS=1
            fi
            echo "    <tr>" >> $GITHUB_OUTPUT
            echo "      <td><code>$ENV</code></td>" >> $GITHUB_OUTPUT
            echo "      <td>$TYPE</td>" >> $GITHUB_OUTPUT
            echo "      <td align='center'><strong>$ICON</strong></td>" >> $GITHUB_OUTPUT
            echo "      <td align='center'><a href='$LOG_URL'>🔍 View</a></td>" >> $GITHUB_OUTPUT
            echo "    </tr>" >> $GITHUB_OUTPUT
          done < all_results.txt

          {
            echo "  </table>"
            echo "</div>"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "FAIL_WORKFLOW=$OVERALL_STATUS" >> $GITHUB_ENV

      - name: Post Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-report
          message: ${{ steps.generate.outputs.REPORT }}

      - name: Check for Failures
        if: env.FAIL_WORKFLOW == '1'
        run: |
          echo "::error::One or more test matrix combinations failed."
          exit 1
